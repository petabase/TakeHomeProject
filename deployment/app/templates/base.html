<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}TTB Label Verifier{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.10"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f6f9;
      color: #1a1a2e;
      min-height: 100vh;
    }

    header {
      background: #1a3a5c;
      color: white;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; }
    header p  { font-size: 0.8rem; opacity: 0.75; margin-top: 2px; }

    .badge-gov {
      background: #c8102e;
      color: white;
      font-size: 1 rem;
      font-weight: 700;
      padding: 10px 20px;
      border-radius: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    main {
      width: min(95vw, 1800px);
      margin: 2rem auto;
      padding: 0 1rem;
    }

    .card {
      background: white;
      border-radius: 10px;
      padding: 2rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.07);
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 1.05rem;
      font-weight: 600;
      color: #1a3a5c;
      margin-bottom: 1.25rem;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #e8edf3;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 500;
      color: #444;
      margin-bottom: 0.3rem;
      margin-top: 1rem;
    }
    label:first-of-type { margin-top: 0; }

    input[type="text"],
    input[type="file"] {
      width: 100%;
      padding: 0.6rem 0.85rem;
      border: 1.5px solid #d0d7e3;
      border-radius: 6px;
      font-size: 0.9rem;
      color: #1a1a2e;
      transition: border-color 0.15s;
    }
    input[type="text"]:focus,
    input[type="file"]:focus {
      outline: none;
      border-color: #1a3a5c;
    }

    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      margin-top: 1rem;
    }
    .checkbox-row input { width: auto; }
    .checkbox-row label { margin: 0; }

    .hint {
      font-size: 0.75rem;
      color: #888;
      margin-top: 0.25rem;
    }

    .btn {
      display: inline-block;
      margin-top: 1.5rem;
      padding: 0.75rem 2rem;
      background: #1a3a5c;
      color: white;
      border: none;
      border-radius: 7px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
      width: 100%;
    }
    .btn:hover { background: #14304f; }

    footer {
      text-align: center;
      font-size: 0.75rem;
      color: #aaa;
      padding: 2rem 1rem;
    }

    {% block extra_styles %}{% endblock %}
  </style>
</head>
<body>

<header>
  <div>
    <h1>🍺 TTB Label Verifier</h1>
    <p>Alcohol Beverage Label Compliance Review</p>
  </div>
  <span class="badge-gov">U.S. Treasury · TTB</span>
</header>

<main>
  {% block content %}{% endblock %}
</main>

<footer>
  TTB Label Verifier — Prototype · Powered by Google Gemini Vision ·
  <a href="https://github.com/petabase/TakeHomeProject" target="_blank"
     style="color:#aaa">GitHub</a>
</footer>

</body>
</html>
